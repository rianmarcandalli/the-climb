services:
  - type: web
    name: the-climb
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      # Paste your Neon connection string here in the Render dashboard (kept secret).
      # When set, the app stores everything in Postgres so data NEVER resets —
      # even on the free plan. Leave it blank to use the disposable local file.
      - key: DATABASE_URL
        sync: false
